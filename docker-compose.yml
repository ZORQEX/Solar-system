# Run the whole simulator:  docker compose up --build
# Then open http://localhost:8081  (server on http://localhost:8080)
services:
  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SCENARIO: "solar-system"   # or binary-star / asteroid-belt / andromeda / figure-eight
      LOG_LEVEL: "info"
      # AUTH_TOKEN: "change-me"   # uncomment to require auth
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_SERVER_URL: "ws://localhost:8080"
        # VITE_AUTH_TOKEN: "change-me"  # must match the server's AUTH_TOKEN
    ports:
      - "8081:80"
    depends_on:
      - server
    restart: unless-stopped
